name: Deploy to Cloudflare Pages

# Builds the static Astro site and deploys it to the openclearance Pages project
# on every push to main. Mirrors the house pattern (open-museum.art / pramod.ch):
# GitHub Actions + a pinned wrangler + an account-scoped API token, NOT
# Cloudflare's native git integration. openclearance.org is a static site, so
# there are no runtime secrets or KV bindings on the Pages project — only the two
# deploy secrets below are needed.
#
# Required repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit), CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.82.2 pages deploy dist --project-name=openclearance --branch=main --commit-dirty=true
