name: Deploy to Cloudflare Pages

# Builds the static site and deploys to Cloudflare Pages on every push to main.
# Uses a pinned wrangler + an account-scoped API token (GitHub Actions secrets),
# not Cloudflare's native git integration. Set the repo secrets
# CLOUDFLARE_API_TOKEN (Pages:Edit scope) and CLOUDFLARE_ACCOUNT_ID before the
# first run.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Conformance check
        run: npm run conformance

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.82.2 pages deploy dist --project-name=openclearance --branch=main --commit-dirty=true
